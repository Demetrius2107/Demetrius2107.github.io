name: Deploy Hugo site to Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: "pages"
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'
          extended: true

      # ✅ 修复1：进入 my-blog 文件夹再构建
      - name: Build
        run: |
          cd my-blog
          hugo --minify

      - name: Setup Pages
        uses: actions/configure-pages@v5
      
      # ✅ 修复2：上传 my-blog/public 里的真实构建产物
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./my-blog/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4